# Nexus Protocol — GoReleaser Configuration
# V6: "The Global Open Source Release"
# Produces versioned binaries and SHA256 checksums for GitHub Releases.

project_name: nexus

before:
  hooks:
    - go mod tidy

builds:
  - id: nexus
    main: ./cmd/nexus/
    binary: nexus
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.nexusVersion={{.Version}}
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- .Arch }}
    files:
      - README.md
      - LICENSE
      - NOTICE
      - CHANGELOG.md
      - SECURITY.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: alpha
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'merge conflict'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: Sumama-Jameel
    name: nexus-engine
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Nexus Protocol {{.Tag}}
    
    A Unified Computing Layer that bridges Windows and Linux with zero-friction, enterprise-grade automation.
  footer: |
    ---
    
    **Full Changelog**: https://github.com/Sumama-Jameel/nexus-engine/compare/{{.PreviousTag}}...{{.Tag}}
    
    **Installation**:
    ```bash
    # Download the binary for your platform from the assets below
    # Verify integrity: sha256sum -c checksums.txt
    chmod +x nexus-*
    ./nexus-* version
    ```
