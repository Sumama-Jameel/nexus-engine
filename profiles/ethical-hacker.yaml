# Nexus Profile: Ethical Hacking Environment
# Designed for Kali Linux. On other distros equivalent tools are installed.
# For full experience, run on Kali Linux or use Distrobox with kali:latest.
name: ethical-hacker
version: "1.0.0"
description: "Penetration testing toolkit — network scanning, exploitation, forensics, reverse engineering"
author: nexus-core
suggested_distro: kali
wsl_available: true

targets:
  - family: debian
    packages:
      - nmap
      - wireshark
      - metasploit-framework
      - burpsuite
      - hydra
      - john
      - sqlmap
      - gobuster
      - ffuf
      - dirb
      - nikto
      - netcat-openbsd
      - tcpdump
      - aircrack-ng
      - reaver
      - bettercap
      - exploitdb
      - hashcat
      - hashcat-utils
      - ocl-icd-libopencl1
      - python3-scapy
      - python3-impacket
      - python3-dnspython
      - proxychains4
      - tor
      - foremost
      - binutils
      - patchelf
      - strace
      - ltrace
      - gdb
      - radare2

  - family: ubuntu
    packages:
      - nmap
      - wireshark
      - hydra
      - john
      - sqlmap
      - gobuster
      - ffuf
      - dirb
