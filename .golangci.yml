# Nexus Protocol — golangci-lint Configuration

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - gofmt
    - goimports
    - misspell
    - ineffassign
    - unused
    - gosimple

linters-settings:
  govet:
    enable-all: true
  gosec:
    excludes:
      - G104
  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-use-default: false

severity:
  default-severity: warning
