# Nexus Protocol — CI Pipeline
# V10: "The Tauri HUD (The Dashboard)"
# Runs on every push and PR to main. Enforces test, lint, build, and dashboard quality gates.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify DCO sign-off
        run: |
          # Check that all commits in the PR have Signed-off-by
          # For PRs, compare against the merge base
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMITS=$(git log "origin/main..HEAD" --format='%H')
          else
            COMMITS=$(git log -1 --format='%H')
          fi
          MISSING=0
          for commit in $COMMITS; do
            if ! git log -1 --format='%B' "$commit" | grep -q 'Signed-off-by:'; then
              echo "❌ Commit $commit is missing Signed-off-by (DCO)"
              git log -1 --oneline "$commit"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "DCO check failed. Add Signed-off-by to your commits:"
            echo "  git commit -s -m 'your message'"
            echo "  or: git rebase --signoff main"
            exit 1
          fi
          echo "✅ All commits have DCO sign-off"

  license-headers:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Apache 2.0 license headers
        run: |
          ./scripts/check-license-headers.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run tests with race detector
        run: go test -race -count=1 ./...

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...

      # Enforces BOTH total coverage (≥80%) AND per-package thresholds
      # defined in scripts/coverage-ratchet.sh. The .coverage-threshold file
      # ratchets upward when coverage improves.
      - name: Enforce coverage ratchet
        run: ./scripts/coverage-ratchet.sh --check

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build (Go)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            make_target: build-linux
          - goos: linux
            goarch: arm64
            make_target: build-linux-arm64
          - goos: windows
            goarch: amd64
            make_target: build-windows
          - goos: windows
            goarch: arm64
            make_target: build-windows-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build Go binary
        run: make ${{ matrix.make_target }}

      - name: Verify binary exists
        run: |
          BINARY=nexus-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi
          test -f "${BINARY}" && echo "Build successful: ${BINARY}"
          ./${BINARY} version

      - name: Upload Go binary
        uses: actions/upload-artifact@v4
        with:
          name: nexus-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nexus-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error

  # ─── V10: Tauri Dashboard build (Linux) ───────────────────────────────
  # Builds the desktop GUI bundle (.deb, .AppImage) for Linux AMD64.
  # The Go engine is built as a Tauri sidecar first.
  tauri-linux:
    name: Tauri Dashboard (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dashboard/src-tauri -> target

      - name: Install Tauri 2 system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Go sidecar (Linux AMD64)
        run: make sidecar-linux

      - name: Verify sidecar binary
        run: |
          file dashboard/src-tauri/binaries/nexus-x86_64-unknown-linux-gnu
          ./dashboard/src-tauri/binaries/nexus-x86_64-unknown-linux-gnu version

      - name: Build Tauri bundle
        run: |
          cd dashboard/src-tauri
          cargo tauri build --bundles deb,appimage

      - name: Verify Tauri artifacts
        run: |
          echo "Tauri bundle outputs:"
          find dashboard/src-tauri/target/release/bundle -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec ls -la {} \;

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-dashboard-linux-amd64
          path: |
            dashboard/src-tauri/target/release/bundle/deb/*.deb
            dashboard/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
