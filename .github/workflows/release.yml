# Nexus Protocol — Release Pipeline
# V10: "The Tauri HUD (The Dashboard)"
# Triggered by pushing a version tag (v*). Produces:
#   - Go binaries via GoReleaser (nexus-{OS}-{ARCH}.tar.gz / .zip)
#   - Tauri desktop bundles (.deb, .AppImage, .msi, .exe) for the dashboard

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── Stage 1: Go binaries via GoReleaser ───────────────────────────────
  goreleaser:
    name: GoReleaser (Go binaries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Stage 2: Tauri Dashboard bundles ─────────────────────────────────
  # Runs after GoReleaser so the release exists. Attaches the .deb /
  # .AppImage (Linux) and .msi / .exe (Windows) bundles to the same
  # GitHub release that GoReleaser created.
  tauri:
    name: Tauri Dashboard Bundles
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_args: --bundles deb,appimage
            artifacts: |
              dashboard/src-tauri/target/release/bundle/deb/*.deb
              dashboard/src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_args: --bundles msi,nsis
            artifacts: |
              dashboard/src-tauri/target/release/bundle/msi/*.msi
              dashboard/src-tauri/target/release/bundle/nsis/*-setup.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dashboard/src-tauri -> target

      # Linux: install Tauri 2 system dependencies
      - name: Install Tauri 2 system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # Windows: install WebView2 + WiX for MSI bundling
      - name: Install Tauri 2 prerequisites (Windows)
        if: matrix.platform == 'windows'
        run: |
          # WiX 3 is required for MSI bundling. Tauri auto-downloads it on
          # first build but pre-installing avoids surprising download time.
          # WebView2 runtime is bundled with Windows 10+ since 2021.
          echo "WebView2 ships with Windows 10+; no install needed."

      - name: Determine Go target triple
        id: target
        run: |
          case "${{ matrix.platform }}-${{ matrix.target }}" in
            linux-x86_64-unknown-linux-gnu)
              GOOS=linux; GOARCH=amd64
              ;;
            windows-x86_64-pc-windows-msvc)
              GOOS=windows; GOARCH=amd64
              ;;
          esac
          echo "goos=${GOOS}" >> "$GITHUB_OUTPUT"
          echo "goarch=${GOARCH}" >> "$GITHUB_OUTPUT"

      - name: Build Go sidecar
        env:
          GOOS: ${{ steps.target.outputs.goos }}
          GOARCH: ${{ steps.target.outputs.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          mkdir -p dashboard/src-tauri/binaries
          BINARY_EXT=""
          if [ "${{ matrix.platform }}" = "windows" ]; then
            BINARY_EXT=".exe"
          fi
          go build -ldflags "-s -w -X main.nexusVersion=${VERSION}" \
            -o "dashboard/src-tauri/binaries/nexus-${{ matrix.target }}${BINARY_EXT}" \
            ./cmd/nexus/

      - name: Verify sidecar
        run: |
          SIDECAR=$(ls dashboard/src-tauri/binaries/nexus-${{ matrix.target }}*)
          echo "Sidecar: ${SIDECAR}"
          file "${SIDECAR}"

      - name: Build Tauri bundle
        working-directory: dashboard/src-tauri
        run: |
          cargo tauri build ${{ matrix.bundle_args }}

      - name: List Tauri artifacts
        if: always()
        run: |
          echo "Tauri bundle directory contents:"
          find dashboard/src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle directory"

      - name: Upload Tauri artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
