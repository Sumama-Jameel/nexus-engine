# Nexus Profile: Base Developer Environment
# This is the default manifest applied by `nexus init`.
# Per the Nexus Protocol: "We shift from Hardcoded to Declarative."
# Per nexusOS.txt: "installs a pre-defined set of High-Utility tools (Java 21, Python, Node)"
# The user just edits a text file to change their OS.

name: base-dev
version: "1.0.0"
description: "The Nexus Base Developer Environment — essential tools for every engineer"
author: nexus-core

targets:
  - family: debian
    packages:
      # Core system tools
      - git
      - curl
      - wget
      - vim
      - htop
      - tmux
      - zsh
      - unzip
      - build-essential
      - ca-certificates
      - gnupg
      # High-Utility Languages (per nexusOS.txt)
      - openjdk-21-jdk
      - python3
      - python3-pip
      - nodejs
      - npm

  - family: arch
    packages:
      # Core system tools
      - git
      - curl
      - wget
      - vim
      - htop
      - tmux
      - zsh
      - unzip
      - base-devel
      - ca-certificates
      - gnupg
      # High-Utility Languages
      - jdk-openjdk
      - python
      - python-pip
      - nodejs
      - npm

  - family: fedora
    packages:
      # Core system tools
      - git
      - curl
      - wget
      - vim-enhanced
      - htop
      - tmux
      - zsh
      - unzip
      - gcc
      - ca-certificates
      - gnupg2
      # High-Utility Languages
      - java-21-openjdk-devel
      - python3
      - python3-pip
      - nodejs
      - npm

  - family: alpine
    packages:
      # Core system tools
      - git
      - curl
      - wget
      - vim
      - htop
      - tmux
      - zsh
      - unzip
      - build-base
      - ca-certificates
      - gnupg
      # High-Utility Languages
      - openjdk21
      - python3
      - py3-pip
      - nodejs
      - npm

env:
  EDITOR: vim
  NEXUS_PROFILE: base-dev
